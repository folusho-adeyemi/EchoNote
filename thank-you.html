<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — EchoNote</title>

  <!-- ✅ GA4 Tag (same ID as main page) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WXVVB2ETRN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WXVVB2ETRN');
    // ✅ Fire a conversion event so GA4 tracks signups
    gtag('event', 'sign_up', { method: 'EchoNote Waitlist' });
  </script>

  <style>
    :root {
      --accent: #6b6ef9;
      --accent-soft: #a89cff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .wordmark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-bottom: 60px;
      text-decoration: none;
      color: #fff;
    }

    .wordmark-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(107, 110, 249, 0.15);
      border: 1px solid rgba(107, 110, 249, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.7); opacity: 0; }
      80% { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: clamp(36px, 6vw, 60px);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto 40px;
    }

    .back-link {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 15px;
      transition: border-color 0.2s, color 0.2s;
    }

    .back-link:hover {
      border-color: rgba(107,110,249,0.5);
      color: #fff;
    }

    .share-note {
      margin-top: 48px;
      font-size: 13px;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <a href="./index.html" class="wordmark">
    <span class="wordmark-dot"></span>
    EchoNote
  </a>

  <div class="check">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <path d="M6 14l6 6 10-10" stroke="#a89cff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>You're on the list.</h1>
  <p>We'll reach out as EchoNote gets closer to launch. Keep doing your thing — we've got your memory covered.</p>

  <a href="./index.html" class="back-link">← Back to EchoNote</a>

  <p class="share-note">Know someone who'd love this? Share the page with them.</p>
</body>
</html>
